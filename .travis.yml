sudo:required

services:
    - docker

before_install:
    - docker build -t layziebone/client-test -f Dockerfile.dev

script:
    - docker run layziebone/client-test npm test

after_success:
    - docker build layziebone/multi-client ./client
    - docker build layziebone/multi-nginx ./nginx
    - docker build layziebone/multi-server ./server
    - docker build layziebone/multi-worker ./worker